<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Giỏ hàng & Theo dõi đơn hàng</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS riêng -->
    <link rel="stylesheet" href="../css/carts_and_order_tracking.css" />
    <link rel="stylesheet" href="../css/dark_mode.css" />
    <link
      rel="website icon"
      href="https://res.cloudinary.com/dvhiojpvf/image/upload/v1772250749/final_project/o0bkdzclxnq3xszsk6mj.png"
      type="image/x-icon"
    />
  </head>

  <body>
    <!-- 🔥 NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="./main.html">Chợ Công Nghệ</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <!-- LEFT MENU -->
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="./main.html">Trang chủ</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./product.html">Sản phẩm</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="./carts_and_order_tracking.html">
                Giỏ Hàng & Theo dõi Đơn Hàng
              </a>
            </li>
          </ul>

          <!-- RIGHT MENU -->
          <ul class="navbar-nav">
            <li class="nav-item">
              <span class="nav-link" id="welcomeText">Xin chào 👋</span>
            </li>
            <li class="nav-item">
              <button class="btn btn-outline-light btn-sm ms-2" id="logoutBtn">
                Đăng xuất
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- 🛒 CONTENT -->
    <div class="container my-4">
      <h2 class="mb-3">🛒 Giỏ hàng của bạn</h2>
      <div id="cartItems"></div>

      <hr class="my-5" />

      <h2 class="mb-3">📦 Theo dõi đơn hàng</h2>
      <div id="orderTracking"></div>
    </div>

    <!-- 💳 PAYMENT MODAL -->
    <div class="modal fade" id="paymentModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

          <div class="modal-header">
            <h5 class="modal-title">Thanh toán đơn hàng</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body text-center">

            <!-- CHỌN PHƯƠNG THỨC -->
            <div id="paymentSelect">
              <p class="fw-bold">Chọn phương thức thanh toán</p>

              <button
                class="btn btn-outline-primary w-100 mb-2"
                onclick="showQRPayment()"
              >
                📱 Thanh toán bằng QR Code
              </button>

              <button
                class="btn btn-outline-success w-100"
                onclick="confirmPayment('COD', 'Chờ thanh toán')"
              >
                💵 Thanh toán khi nhận hàng (COD)
              </button>
            </div>

            <!-- QR PAYMENT -->
            <div id="qrPayment" style="display: none">
              <p class="fw-bold">Quét mã QR để thanh toán</p>

              <img
                id="qrImage"
                class="mb-2"
                alt="QR Code"
              />

              <p id="qrAmount" class="text-danger fw-bold"></p>

              <!-- ⏳ TIMER -->
              <p id="qrTimer" class="text-warning fw-bold"></p>

              <button
                id="qrConfirmBtn"
                class="btn btn-success mt-2"
                onclick="confirmQRPayment()"
              >
                ✅ Tôi đã thanh toán
              </button>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-firestore-compat.min.js"></script>

    <!-- JS -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/carts_and_order_tracking.js"></script>
    <script src="../js/dark_mode.js"></script>
    <script src="../js/chatbot.js"></script>
  </body>
</html>
