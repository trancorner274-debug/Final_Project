<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - Chợ Công Nghệ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/admin.css">
  </head>

  <body class="bg-light">
    <div class="container my-4">
      <h2 class="mb-4">🛠 Trang quản trị</h2>

      <!-- DASHBOARD -->
      <div class="row mb-4">
        <div class="col-md-3">
          <div class="card text-center">
            <div class="card-body">
              <h6>💰 Doanh thu</h6>
              <strong id="totalRevenue">0 ₫</strong>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card text-center">
            <div class="card-body">
              <h6>📦 Tổng đơn</h6>
              <strong id="totalOrders">0</strong>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card text-center">
            <div class="card-body">
              <h6>🚚 Đang xử lý</h6>
              <strong id="pendingOrders">0</strong>
            </div>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card text-center">
            <div class="card-body">
              <h6>✅ Hoàn thành</h6>
              <strong id="doneOrders">0</strong>
            </div>
          </div>
        </div>
      </div>

      <!-- PRODUCT FORM -->
      <h4>📦 Quản lý sản phẩm</h4>
      <form id="productForm" class="card p-3 mb-4">
        <input type="hidden" id="productId" />

        <div class="row g-2">
          <div class="col-md-6">
            <input id="name" class="form-control" placeholder="Tên sản phẩm" />
          </div>
          <div class="col-md-3">
            <input
              id="price"
              type="number"
              class="form-control"
              placeholder="Giá"
            />
          </div>
          <div class="col-md-3">
            <input
              id="stock"
              type="number"
              class="form-control"
              placeholder="Tồn kho"
            />
          </div>
        </div>

        <div class="row g-2 mt-2">
          <div class="col-md-6">
            <input
              id="imageUrl"
              class="form-control"
              placeholder="Link ảnh"
            />
          </div>
          <div class="col-md-6">
            <select id="category" class="form-select">
              <option value="">-- Danh mục --</option>
              <option value="Laptop">Laptop</option>
              <option value="Điện thoại">Điện thoại</option>
              <option value="Phụ kiện">Phụ kiện</option>
            </select>
          </div>
        </div>

        <textarea
          id="description"
          class="form-control mt-2"
          placeholder="Mô tả"
        ></textarea>

        <button class="btn btn-primary mt-3">💾 Lưu sản phẩm</button>
      </form>

      <div id="productsList" class="mb-5"></div>

      <!-- ORDERS -->
      <h4>🧾 Quản lý đơn hàng</h4>
      <div class="table-responsive">
        <table class="table table-bordered bg-white align-middle">
          <thead class="table-dark">
            <tr>
              <th>Tổng tiền</th>
              <th>PT Thanh toán</th>
              <th>Trạng thái thanh toán</th>
              <th>Trạng thái đơn</th>
            </tr>
          </thead>
          <tbody id="ordersList"></tbody>
        </table>
      </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-firestore-compat.min.js"></script>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/admin.js"></script>
  </body>
</html>
