<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chợ Điện Tử 2025-Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/register.css">
    <link rel="website icon" href="https://res.cloudinary.com/dvhiojpvf/image/upload/v1772250749/final_project/o0bkdzclxnq3xszsk6mj.png" type="image/x-icon"/>
</head>

<body>
    <div class="formContainer">
        <form id="registerForm">
            <h2 class="text-center mb-4">Đăng Ký Tài Khoản</h2>
            <div class="mb-3">
                <label for="username" class="form-label">Tên Đăng Nhập</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Mật Khẩu</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Xác Nhận Mật Khẩu</label>
                <input type="password" class="form-control" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Đăng Ký</button>
            <p class="text-center mt-3">Đã có tài khoản? <a href="login.html">Đăng Nhập</a></p>
        </form>
    </div>

    <!-- CDN LINKS -->
     <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Firebase CDN Links -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-firestore-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-storage-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-auth-compat.min.js"></script>
    <!-- Firebase Configuration -->
    <script src="../js/firebase-config.js"></script>
    <!-- Register JS -->
    <script src="../js/register.js"></script>
</body>

</html>
